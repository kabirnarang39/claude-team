mcps:
  # Verified with npm view on 2026-06-27.
  # Entries with ${VAR} placeholders are skipped when the variable is unset.

  # Core local context
  filesystem:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "."]
    description: Read and search files in the current project directory

  # Research
  brave-search:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-brave-search"]
    env:
      BRAVE_API_KEY: "${BRAVE_API_KEY}"
    description: Web and local search through Brave Search API

  # Version control
  github:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_PERSONAL_ACCESS_TOKEN}"
    description: GitHub repositories, issues, pull requests, and code search

  gitlab:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-gitlab"]
    env:
      GITLAB_PERSONAL_ACCESS_TOKEN: "${GITLAB_PERSONAL_ACCESS_TOKEN}"
    description: GitLab projects, issues, merge requests, and repository files

  # Databases
  postgres:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-postgres", "${DATABASE_URL}"]
    description: Read-only PostgreSQL schema inspection and queries

  # Testing and browser automation
  playwright:
    command: npx
    args: ["-y", "@playwright/mcp"]
    description: Browser automation, E2E testing, and screenshots

  # Communication
  slack:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-slack"]
    env:
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN}"
      SLACK_TEAM_ID: "${SLACK_TEAM_ID}"
    description: Slack channels, messages, threads, reactions, and users
