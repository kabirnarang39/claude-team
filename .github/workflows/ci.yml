name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Install dependencies
        run: go mod download
      - name: Vet
        run: go vet ./...
      - name: Test (with race detector)
        run: go test -race ./...
      - name: Build
        run: go build -o /dev/null .
